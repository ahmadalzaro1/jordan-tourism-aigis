version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: tourism_gis
      POSTGRES_USER: tourism
      POSTGRES_PASSWORD: tourism
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/schema/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourism -d tourism_gis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  superset:
    image: apache/superset:4.1.2
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "jordan-tourism-aigis-secret-key-change-in-production"
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      DATABASE_DB: tourism_gis
      DATABASE_HOST: db
      DATABASE_PASSWORD: tourism
      DATABASE_PORT: "5432"
      DATABASE_USER: tourism
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_EMAIL: admin@tourism.jo
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/init.sh:/app/docker-init.sh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tourism:tourism@db:5432/tourism_gis
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPERSET_URL: http://localhost:8088
    depends_on:
      - backend

volumes:
  pgdata:
  superset_home:
